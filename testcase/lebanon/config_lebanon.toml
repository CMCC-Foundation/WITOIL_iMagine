# NOTE: this config is provided as a TEMPLATE, it should be changed by the user before using it.
[simulation_setup]
    name = "lebanon" # name of the simulation.
    experiment_path = "testcase" # path where experiment folder should be placed. Can be whatever. Default is "./output"
    sim_length = 240 # length of the simulation in HOURS
    time_step = 1800 # Time step in SECONDS
    advanced_parameters_path = "testcase/lebanon/parameters_lebanon.toml"
    oil_tracer_grid_step = 150.0 # Grid step of the oil tracer grid in METERS
[initial_conditions]
    start_datetime = "2006-07-13T08" # start date of the simulation ("%y-%m-%dT%h")
    spill_lat_deg = 33 # lat of oil spill (deg N)
    spill_lat_min = 41 # lat of oil spill (minutes N)
    spill_lon_deg = 35 # lon of oil spill (deg E)
    spill_lon_min = 10 # lat of oil spill (minutes E)
    spill_duration = 144 # duration of oil spill HOURS. = 0.0 for instantaneous release
    spill_rate = 130.35 # spill rate TONS/HOUR
    oil_api = 19.80 # API of the oil
    contour_slick = false # set true in case of contour slick (also if contour should be read from shapefile)
    slick_vertices = []
[download]
    download_data = false # = true if data are not provided by the user
    download_curr = false # = true : OCE data are downloaded from Copernicus Marine Service
    download_wind = false # = true : MET data are downloaded from ECMWF ERA5 product
    copernicus_user = "my_username"
    copernicus_password = "my_password"
    cds_token = "cds_token"
[input_files]
    set_domain = true
    longitude = [34, 36] # used if set_domain = true
    latitude = [33, 35] # used if set_domain = true
    delta = 0.75 # domain length in degrees, centered at the release point
                 # delta is used only if set_domain = false
    preproc_path = "testcase/lebanon" # path to preprocessed data. = false or "none" if preprocessing is used.
                         # It will be used ONLY if preprocessing of BOTH dtm/metoce data is NOT performed.
    [input_files.dtm]
        bathymetry_path = "none" # GEBCO 2023 bathymetry file
        coastline_path = "input_data/coastline/gshhg/GSHHS_shp/f/GSHHS_f_L1.shp" # coastline shapefile gshhg
    [input_files.metoce]
        oce_data_path = "testcase/lebanon/oce_files" # to provide if dowload_curr = false
        met_data_path = "testcase/lebanon/met_files" # to provide if dowload_wind = false
    [input_files.shapefile]
        shape_path = "none" # add "path/to/shapefile" in case you want to start from shapefile.
        # set shape_path = false or "none" if you do NOT want to start from a shapefile
[run_options]
    preprocessing_metoce = false # MET/OCE data preprocessing
    preprocessing_dtm = false # bathymetry and coastline preprocessing
    run_model = true # run oil spill model
    postprocessing = true # conversion from particles to concentration
[plot_options]
    plotting = true # = true if results should be plotted (it should be used only if postprocessing = true)
    pyngl = false
    # Domain for plotting
    plot_lon = [34.75, 35.75]
    plot_lat = [33.5, 34.5]
    concentration_range = [0, 100]
    plot_step_hrs = 24
